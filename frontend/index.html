<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postbook</title>
    <link rel="icon" type="image/png" href="./favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@200..800&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/60cfca8b6d.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<main>
<h1>Welcome to Postbook <i class="fa-solid fa-paper-plane"></i></h1>

<div class="login-form" id="login-form">
    <h3>Please Login</h3>

    <form onsubmit="handleLogin(event)">
        <input type="text" id="login-username" placeholder="Username" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit" class="login-btn">
            <i class="fa-solid fa-user-check"></i> Login
        </button>
    </form>

    <p class="switch-text">
        Don’t have an account?
        <span class="switch-link" onclick="toggleRegister()">Register</span>
    </p>
</div>

<div class="login-form hidden" id="register-form">
    <h3>Create New Account</h3>

    <form onsubmit="handleRegister(event)">
        <input type="text" id="reg-username" placeholder="Username" required>
        <input type="text" id="reg-image" placeholder="Profile Image URL">
        <input type="password" id="reg-password" placeholder="Password" required>
        <button type="submit" class="login-btn">
            <i class="fa-solid fa-user-plus"></i> Register
        </button>
    </form>

    <p class="switch-text">
        Already have an account?
        <span class="switch-link" onclick="toggleRegister()">Login</span>
    </p>
</div>

<div id="user-login-error" class="error hidden">
    <h3>User ID or Password is wrong!</h3>
</div>
</main>

<script src="./js/login.js?v=2026"></script>
</body>
</html>
